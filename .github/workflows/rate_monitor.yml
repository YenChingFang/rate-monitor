name: 市場監控

on:
  schedule:
    - cron: '*/10 * * * *'  # 每10分鐘檢查一次
  workflow_dispatch:
    inputs:
      force_daily:
        description: '強制發送每日日報（忽略時間限制）'
        type: boolean
        default: false
      test_notify:
        description: '發送 Telegram 測試通知'
        type: boolean
        default: false
      test_alerts:
        description: '試跑大盤下跌通知（用真實價格，略過閾值）'
        type: boolean
        default: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 程式碼
        uses: actions/checkout@v4

      - name: 還原狀態紀錄
        uses: actions/cache@v4
        with:
          path: last_alert.json
          key: last-alert-${{ github.run_id }}
          restore-keys: |
            last-alert-

      - name: 安裝套件
        run: pip install requests yfinance

      - name: 人民幣匯率監控
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python rate_agent.py

      - name: 大盤即時監控
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TEST_ALERTS: ${{ inputs.test_alerts }}
        run: python stock_agent.py

      - name: 每日市場日報
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FORCE_DAILY: ${{ inputs.force_daily }}
        run: python daily_report.py

      - name: Telegram 測試通知
        if: ${{ inputs.test_notify == true }}
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python -c "
          import os, requests
          from datetime import datetime, timezone, timedelta
          now = datetime.now(timezone(timedelta(hours=8))).strftime('%Y/%m/%d %H:%M')
          token = os.environ['TELEGRAM_TOKEN']
          chat_id = os.environ['TELEGRAM_CHAT_ID']
          text = f'✅ 系統測試通知\n{now}\n\n監控系統運作正常 🟢'
          requests.post(f'https://api.telegram.org/bot{token}/sendMessage', json={'chat_id': chat_id, 'text': text}, timeout=10)
          print('測試通知發送完成')
          "

      - name: 儲存狀態紀錄
        uses: actions/cache/save@v4
        if: always()
        with:
          path: last_alert.json
          key: last-alert-${{ github.run_id }}
