name: 市場監控

on:
  schedule:
    - cron: '*/10 * * * *'  # 每10分鐘檢查一次
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 程式碼
        uses: actions/checkout@v4

      - name: 還原狀態紀錄
        uses: actions/cache@v4
        with:
          path: last_alert.json
          key: last-alert-${{ github.run_id }}
          restore-keys: |
            last-alert-

      - name: 安裝套件
        run: pip install requests yfinance

      - name: 人民幣匯率監控
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python rate_agent.py

      - name: 美股下跌監控
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python stock_agent.py

      - name: 每日市場日報
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python daily_report.py

      - name: 儲存狀態紀錄
        uses: actions/cache/save@v4
        if: always()
        with:
          path: last_alert.json
          key: last-alert-${{ github.run_id }}
